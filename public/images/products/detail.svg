<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1125" role="img" aria-label="Detail impression produit">
  <defs>
    <linearGradient id="mist" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#95a9bb"/>
      <stop offset="100%" stop-color="#40586f"/>
    </linearGradient>
  </defs>
  <rect width="900" height="1125" fill="#f2efe7"/>
  <rect x="120" y="120" width="660" height="660" fill="url(#mist)" stroke="#d3d1ca" stroke-width="12"/>
  <text x="450" y="405" text-anchor="middle" fill="#f2efe7" font-family="Georgia, serif" font-size="64">On ne voit bien</text>
  <text x="450" y="480" text-anchor="middle" fill="#f2efe7" font-family="Georgia, serif" font-size="64">qu&apos;avec le coeur.</text>
  <text x="450" y="560" text-anchor="middle" fill="#f2efe7" font-family="Arial, sans-serif" font-size="22" letter-spacing="4">L&apos;ESSENTIEL EST INVISIBLE</text>
  <rect x="280" y="860" width="340" height="34" fill="#0b1a3b"/>
  <text x="450" y="884" text-anchor="middle" fill="#f2efe7" font-family="Arial, sans-serif" font-size="16" letter-spacing="3">DETAIL</text>
</svg>
